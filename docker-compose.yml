services:
  nginx:
    build:
      context: .
      dockerfile: docker/production/nginx/Dockerfile
    container_name: alvras-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - alvras-storage-production:/var/www/html/storage:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - alvras-network

  app:
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
    container_name: alvras-app-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      AWS_ENDPOINT: http://minio:9000
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - alvras-storage-production:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    depends_on:
      - pgsql
      - redis
    networks:
      - alvras-network
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'OK';"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  queue_worker:
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
    container_name: alvras-worker-prod
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600 --verbose
    env_file:
      - .env
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      AWS_ENDPOINT: http://minio:9000
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - alvras-storage-production:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    depends_on:
      - app
      - redis
    networks:
      - alvras-network

  scheduler:
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
    container_name: alvras-scheduler-prod
    restart: unless-stopped
    command: php artisan schedule:work --verbose --no-interaction
    env_file:
      - .env
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      AWS_ENDPOINT: http://minio:9000
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - alvras-storage-production:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    depends_on:
      - app
    networks:
      - alvras-network

  redis:
    image: redis:alpine
    container_name: alvras-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data-production:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alvras-network

  pgsql:
    image: postgres:16
    container_name: alvras-pgsql-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - alvras-pgsql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alvras-network

  minio:
    image: minio/minio
    container_name: alvras-minio-prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - alvras-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

networks:
  alvras-network:
    driver: bridge

volumes:
  alvras-pgsql-data:
  minio-data:
  redis-data-production:
  alvras-storage-production:
