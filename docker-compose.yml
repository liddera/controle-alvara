  app:
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
    container_name: alvras-app-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: ${AWS_URL}
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - alvras-storage-production:/var/www/html/storage
      - .env:/var/www/html/.env:ro
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'OK';"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - alvras-network

  queue_worker:
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
    container_name: alvras-worker-prod
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600 --verbose
    env_file:
      - .env
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: ${AWS_URL}
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - alvras-storage-production:/var/www/html/storage
      - .env:/var/www/html/.env:ro
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alvras-network

  scheduler:
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
    container_name: alvras-scheduler-prod
    restart: unless-stopped
    command: php artisan schedule:work --verbose --no-interaction
    env_file:
      - .env
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: ${AWS_URL}
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - alvras-storage-production:/var/www/html/storage
      - .env:/var/www/html/.env:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - alvras-network

  redis:
    image: redis:alpine
    container_name: alvras-redis-prod
    restart: unless-stopped
    volumes:
      - redis-data-production:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alvras-network

  pgsql:
    image: postgres:16
    container_name: alvras-pgsql-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - alvras-pgsql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alvras-network
