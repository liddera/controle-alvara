version: "3.9"

services:
  pgsql:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: alvras
      POSTGRES_USER: alvras_user
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - alvras-pgsql-data:/var/lib/postgresql/data
    networks:
      - alvras-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9001"
      MINIO_SERVER_URL: "http://localhost:9000"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - alvras-network

networks:
  alvras-network:
    driver: bridge

volumes:
  alvras-pgsql-data:
  minio-data:
