services:
  nginx:
    build:
      context: .
      dockerfile: docker/production/nginx/Dockerfile
    container_name: alvras-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - alvras-storage-production:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - alvras-network

  app:
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
    container_name: alvras-app-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      AWS_ENDPOINT: http://minio:9000
      # 👇 AGORA CORRETO
      AWS_URL: ${AWS_URL}
    volumes:
      - .:/var/www/html
      - alvras-storage-production:/var/www/html/storage
    depends_on:
      - pgsql
    networks:
      - alvras-network

  queue_worker:
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
    container_name: alvras-worker-prod
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3
    env_file:
      - .env
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: ${AWS_URL}
    volumes:
      - .:/var/www/html
      - alvras-storage-production:/var/www/html/storage
    depends_on:
      - app
      - redis
    networks:
      - alvras-network

  scheduler:
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
    container_name: alvras-scheduler-prod
    restart: unless-stopped
    command: php artisan schedule:work --verbose --no-interaction
    env_file:
      - .env
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: ${AWS_URL}
    volumes:
      - .:/var/www/html
      - alvras-storage-production:/var/www/html/storage
    depends_on:
      - app
    networks:
      - alvras-network

  redis:
    image: redis:alpine
    container_name: alvras-redis-prod
    restart: unless-stopped
    volumes:
      - redis-data-production:/data
    networks:
      - alvras-network

  pgsql:
    image: postgres:16
    container_name: alvras-pgsql-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - alvras-pgsql-data:/var/lib/postgresql/data
    networks:
      - alvras-network

  minio:
    image: minio/minio
    container_name: alvras-minio-prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - alvras-network

networks:
  alvras-network:
    driver: bridge

volumes:
  alvras-pgsql-data:
  minio-data:
  redis-data-production:
  alvras-storage-production:
